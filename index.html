<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inventario</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --ink: #76787a;          /* gris institucional (header / barras) */
    --ink-dark: #5f6163;     /* gris más oscuro para contraste */
    --paper: #f7f6f4;        /* fondo claro */
    --line: #e0ddd7;
    --accent: #ba0c2f;       /* rojo/vino del logo */
    --accent-dark: #91091f;
    --green: #1f9d61;
    --green-bg: #e7f6ee;
    --amber: #e8a33d;
    --muted: #8a8578;
    --card: #ffffff;
    --lock: #ba0c2f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 30px;
  }
  body.staff { padding-bottom: 90px; }
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 20px;
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header .ht { display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo {
    height: 34px;
    width: auto;
    /* el logo es gris/rojo; lo volvemos blanco para que resalte sobre el header gris */
    filter: brightness(0) invert(1);
  }
  header .count { font-size: 13px; color: #b8b3a6; font-weight: 500; }
  .lock-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .lock-btn.unlocked { background: var(--green); }
  .mode-badge {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 9px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    color: #d8d3c6;
  }
  .mode-badge.staff { background: var(--green); color: #fff; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 16px; }

  .scan-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  #video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #111;
    display: none;
  }
  #video { width: 100%; height: 100%; object-fit: cover; }
  .scan-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .scan-box {
    width: 75%; height: 28%;
    border: 2px solid var(--accent);
    border-radius: 10px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
  }
  .scan-line {
    position: absolute; left: 12.5%; width: 75%; height: 2px;
    background: var(--accent);
    animation: scan 2s ease-in-out infinite;
  }
  @keyframes scan { 0%,100%{top:38%;} 50%{top:62%;} }
  .scan-placeholder { padding: 40px 20px; text-align: center; color: var(--muted); }
  .scan-placeholder svg { margin-bottom: 12px; }
  .scan-placeholder p { font-size: 14px; line-height: 1.5; }

  .result { padding: 18px; border-top: 1px solid var(--line); display: none; }
  .result.show { display: block; }
  .result.found { background: var(--green-bg); }
  .result.notfound { background: #fef4e8; }
  .result-code { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; margin-bottom: 4px; }
  .result-status { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .result.found .result-status { color: var(--green); }
  .result.notfound .result-status { color: var(--amber); }
  .result-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .result-title { font-size: 15px; color: var(--muted); margin: 2px 0 8px; }
  .result-price { font-size: 28px; font-weight: 800; color: var(--ink); }
  .result-actions { display: flex; gap: 10px; margin-top: 14px; }

  button {
    font-family: inherit; cursor: pointer; border: none; border-radius: 12px;
    font-weight: 600; transition: transform .08s, opacity .15s;
  }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; padding: 15px; width: 100%; font-size: 16px; }
  .btn-secondary { background: var(--ink); color: #fff; padding: 12px 16px; font-size: 14px; flex: 1; }
  .btn-ghost { background: #fff; border: 1px solid var(--line); color: var(--ink); padding: 12px 16px; font-size: 14px; flex: 1; }
  .btn-lock { background: var(--lock); color: #fff; }

  .search-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .search-bar input {
    flex: 1; padding: 13px 16px; border: 1px solid var(--line);
    border-radius: 12px; font-size: 15px; font-family: inherit; background: #fff;
  }
  .search-bar input:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .section-label {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin: 20px 4px 10px;
  }
  .product {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 16px; font-weight: 700; }
  .product-title { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-code { font-size: 11px; color: #b5b0a3; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .product-price { font-size: 18px; font-weight: 800; white-space: nowrap; }
  .product-edit {
    background: var(--paper); border: 1px solid var(--line);
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(26,29,41,0.55);
    backdrop-filter: blur(4px); display: none;
    align-items: flex-end; justify-content: center; z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--paper); width: 100%; max-width: 560px;
    border-radius: 22px 22px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    animation: slideUp .25s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
  .modal h2 { font-size: 20px; margin-bottom: 4px; letter-spacing: -0.5px; }
  .modal .sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 14px 16px; border: 1px solid var(--line);
    border-radius: 12px; font-size: 16px; font-family: inherit; background: #fff;
  }
  .field input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }

  .bottombar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--paper); border-top: 1px solid var(--line);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); z-index: 40;
    display: none;
  }
  body.staff .bottombar { display: block; }
  .bottombar .wrap-bb { max-width: 560px; margin: 0 auto; }

  .toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 12px 20px;
    border-radius: 12px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: all .25s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .staff-only { display: none; }
  body.staff .staff-only { display: block; }
  .login-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
<header>
  <div class="ht">
    <img src="logo.svg" alt="LCF" class="logo" onerror="this.style.display='none'">
    <span class="mode-badge" id="modeBadge">Consulta</span>
  </div>
  <div class="ht">
    <span class="count" id="count">0</span>
    <button class="lock-btn" id="lockBtn" onclick="toggleLock()" title="Acceso empleado">
      <svg id="lockIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      </svg>
    </button>
  </div>
</header>

<div class="wrap">
  <div class="scan-card">
    <div id="video-container">
      <video id="video" playsinline></video>
      <div class="scan-overlay"><div class="scan-box"></div></div>
      <div class="scan-line"></div>
    </div>
    <div class="scan-placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8a8578" stroke-width="1.5">
        <rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9v6M10 9v6M13 9v6M16 9v6"/>
      </svg>
      <p>Toca "Escanear" para leer un código<br>y ver el precio del producto</p>
    </div>
    <div class="result" id="result">
      <div class="result-code" id="r-code"></div>
      <div class="result-status" id="r-status"></div>
      <div class="result-name" id="r-name"></div>
      <div class="result-title" id="r-title"></div>
      <div class="result-price" id="r-price"></div>
      <div class="result-actions" id="r-actions"></div>
    </div>
  </div>

  <button class="btn-primary" id="scanBtn" onclick="toggleScan()">Escanear código</button>

  <div class="section-label">Catálogo</div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Buscar por nombre o código…" oninput="render()">
  </div>
  <div id="list"></div>
</div>

<div class="bottombar">
  <div class="wrap-bb" style="display:flex;gap:10px">
    <button class="btn-ghost" style="flex:1" onclick="openModal()">+ Agregar</button>
    <button class="btn-ghost" style="flex:1" onclick="document.getElementById('fileInput').click()">↑ Importar archivo</button>
  </div>
</div>
<input type="file" id="fileInput" accept=".csv,.txt,.xlsx,.xls" style="display:none" onchange="handleFile(event)">

<!-- Modal producto -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Nuevo producto</h2>
    <div class="sub" id="modalCode"></div>
    <div class="field"><label>Nombre</label><input type="text" id="f-name" placeholder="Ej. El Quijote"></div>
    <div class="field"><label>Título / descripción</label><input type="text" id="f-title" placeholder="Ej. Editorial Planeta, pasta dura"></div>
    <div class="field"><label>Precio</label><input type="text" id="f-price" inputmode="decimal" placeholder="Ej. 349"></div>
    <div class="field"><label>Código de barras</label><input type="text" id="f-code" inputmode="numeric" placeholder="Escanea o escribe el código"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="deleteBtn" style="display:none" onclick="deleteProduct()">Eliminar</button>
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-secondary" onclick="saveProduct()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal login -->
<div class="modal-bg" id="loginBg">
  <div class="modal">
    <h2 id="loginTitle">Acceso empleado</h2>
    <div class="sub">Ingresa tus credenciales para modificar el inventario.</div>
    <div class="field"><label>Usuario</label><input type="text" id="l-user" autocomplete="off" placeholder="Usuario"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="Contraseña"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeLogin()">Cancelar</button>
      <button class="btn-lock" style="flex:1" onclick="doLogin()">Entrar</button>
    </div>
    <div class="login-hint" id="loginHint"></div>
  </div>
</div>

<!-- Modal cambiar credenciales -->
<div class="modal-bg" id="credBg">
  <div class="modal">
    <h2>Cambiar credenciales</h2>
    <div class="sub">Define el usuario y contraseña del empleado.</div>
    <div class="field"><label>Nuevo usuario</label><input type="text" id="c-user" autocomplete="off"></div>
    <div class="field"><label>Nueva contraseña</label><input type="password" id="c-pass"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeCred()">Cancelar</button>
      <button class="btn-secondary" onclick="saveCred()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal importar -->
<div class="modal-bg" id="importBg">
  <div class="modal">
    <h2>Vista previa de importación</h2>
    <div class="sub" id="importSummary"></div>
    <div id="importPreview" style="max-height:240px;overflow-y:auto;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:8px"></div>
    <div class="field" style="margin-top:14px">
      <label style="display:flex;align-items:center;gap:8px;font-weight:500">
        <input type="checkbox" id="updateExisting" checked style="width:auto;transform:scale(1.3)">
        Actualizar productos que ya existen (mismo código)
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeImport()">Cancelar</button>
      <button class="btn-secondary" onclick="confirmImport()">Importar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_KEY = 'inventario_productos_v1';
const AUTH_KEY = 'inventario_auth_v1';
let products = load();
let editingId = null;
let codeReader = null;
let scanning = false;
let isStaff = false;

/* ---------- Auth ---------- */
function getAuth() {
  try {
    const a = JSON.parse(localStorage.getItem(AUTH_KEY));
    if (a && a.user) return a;
  } catch {}
  return { user: 'admin', pass: '1234' }; // credenciales por defecto
}
function setAuth(user, pass) {
  localStorage.setItem(AUTH_KEY, JSON.stringify({ user, pass }));
}

function toggleLock() {
  if (isStaff) {
    // cerrar sesión
    isStaff = false;
    document.body.classList.remove('staff');
    document.getElementById('lockBtn').classList.remove('unlocked');
    document.getElementById('lockIcon').innerHTML = '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>';
    document.getElementById('modeBadge').textContent = 'Consulta';
    document.getElementById('modeBadge').classList.remove('staff');
    toast('Sesión cerrada');
    render();
  } else {
    openLogin();
  }
}

function openLogin() {
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
  const auth = getAuth();
  const isDefault = auth.user === 'admin' && auth.pass === '1234';
  document.getElementById('loginHint').textContent = isDefault
    ? 'Primera vez: usuario "admin", contraseña "1234". Cámbialos después de entrar.'
    : '';
  document.getElementById('loginBg').classList.add('show');
}
function closeLogin() { document.getElementById('loginBg').classList.remove('show'); }

function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const auth = getAuth();
  if (u === auth.user && p === auth.pass) {
    isStaff = true;
    document.body.classList.add('staff');
    document.getElementById('lockBtn').classList.add('unlocked');
    document.getElementById('lockIcon').innerHTML = '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 7-2.6"/>';
    document.getElementById('modeBadge').textContent = 'Empleado';
    document.getElementById('modeBadge').classList.add('staff');
    closeLogin();
    toast('Bienvenido, modo empleado activo');
    render();
  } else {
    toast('Usuario o contraseña incorrectos');
    if (navigator.vibrate) navigator.vibrate([60,40,60]);
  }
}

/* cambiar credenciales */
function openCred() {
  const auth = getAuth();
  document.getElementById('c-user').value = auth.user;
  document.getElementById('c-pass').value = '';
  document.getElementById('credBg').classList.add('show');
}
function closeCred() { document.getElementById('credBg').classList.remove('show'); }
function saveCred() {
  const u = document.getElementById('c-user').value.trim();
  const p = document.getElementById('c-pass').value;
  if (!u || !p) { toast('Completa usuario y contraseña'); return; }
  setAuth(u, p);
  closeCred();
  toast('Credenciales actualizadas');
}

/* ---------- DB ---------- */
function load() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; }
  catch { return []; }
}
function save() { localStorage.setItem(DB_KEY, JSON.stringify(products)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function money(n) {
  const v = parseFloat(n);
  if (isNaN(v)) return n || '—';
  return '$' + v.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ---------- Scanner ---------- */
async function toggleScan() {
  if (scanning) { stopScan(); return; }
  startScan();
}
async function startScan() {
  const container = document.getElementById('video-container');
  const placeholder = document.getElementById('placeholder');
  const btn = document.getElementById('scanBtn');
  try {
    if (!codeReader) codeReader = new ZXing.BrowserMultiFormatReader();
    container.style.display = 'block';
    placeholder.style.display = 'none';
    document.getElementById('result').classList.remove('show');
    btn.textContent = 'Detener escáner';
    btn.style.background = 'var(--ink)';
    scanning = true;
    const devices = await codeReader.listVideoInputDevices();
    let deviceId = devices[0]?.deviceId;
    const back = devices.find(d => /back|trasera|rear|environment/i.test(d.label));
    if (back) deviceId = back.deviceId;
    codeReader.decodeFromVideoDevice(deviceId, 'video', (res) => {
      if (res) handleScan(res.getText());
    });
  } catch (e) {
    toast('No se pudo abrir la cámara');
    stopScan();
  }
}
function stopScan() {
  if (codeReader) codeReader.reset();
  scanning = false;
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('placeholder').style.display = 'block';
  const btn = document.getElementById('scanBtn');
  btn.textContent = 'Escanear código';
  btn.style.background = 'var(--accent)';
}
let lastScan = 0;
function handleScan(code) {
  const now = Date.now();
  if (now - lastScan < 1500) return;
  lastScan = now;
  if (navigator.vibrate) navigator.vibrate(80);
  stopScan();
  showResult(code);
}
function showResult(code) {
  const result = document.getElementById('result');
  const found = products.find(p => p.code === code);
  result.classList.add('show');
  document.getElementById('r-code').textContent = 'Código: ' + code;
  if (found) {
    result.className = 'result show found';
    document.getElementById('r-status').textContent = '✓ Producto encontrado';
    document.getElementById('r-name').textContent = found.name;
    document.getElementById('r-title').textContent = found.title || '';
    document.getElementById('r-price').textContent = money(found.price);
    let actions = '<button class="btn-secondary" onclick="startScan()">Escanear otro</button>';
    if (isStaff) {
      actions = '<button class="btn-ghost" onclick="openModal(\'' + found.id + '\')">Editar</button>' + actions;
    }
    document.getElementById('r-actions').innerHTML = actions;
  } else {
    result.className = 'result show notfound';
    document.getElementById('r-status').textContent = '⚠ No existe en el inventario';
    document.getElementById('r-name').textContent = 'Producto no registrado';
    document.getElementById('r-title').textContent = '';
    document.getElementById('r-price').textContent = '';
    if (isStaff) {
      document.getElementById('r-actions').innerHTML =
        '<button class="btn-secondary" onclick="openModal(null, \'' + code + '\')">Agregar este producto</button>';
    } else {
      document.getElementById('r-actions').innerHTML =
        '<button class="btn-secondary" onclick="startScan()">Escanear otro</button>';
    }
  }
}

/* ---------- CRUD (solo empleado) ---------- */
function openModal(id = null, prefillCode = '') {
  if (!isStaff) { toast('Necesitas acceso de empleado'); return; }
  editingId = id;
  const del = document.getElementById('deleteBtn');
  if (id) {
    const p = products.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = 'Editar producto';
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-title').value = p.title || '';
    document.getElementById('f-price').value = p.price;
    document.getElementById('f-code').value = p.code || '';
    del.style.display = 'block';
  } else {
    document.getElementById('modalTitle').textContent = 'Nuevo producto';
    document.getElementById('f-name').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-code').value = prefillCode;
    del.style.display = 'none';
  }
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
  editingId = null;
}
function saveProduct() {
  if (!isStaff) return;
  const name = document.getElementById('f-name').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const price = document.getElementById('f-price').value.trim();
  const code = document.getElementById('f-code').value.trim();
  if (!name) { toast('Escribe un nombre'); return; }
  if (code) {
    const dup = products.find(p => p.code === code && p.id !== editingId);
    if (dup) { toast('Ese código ya lo usa: ' + dup.name); return; }
  }
  if (editingId) {
    const p = products.find(x => x.id === editingId);
    p.name = name; p.title = title; p.price = price; p.code = code;
    toast('Producto actualizado');
  } else {
    products.push({ id: uid(), name, title, price, code });
    toast('Producto agregado');
  }
  save(); render(); closeModal();
  document.getElementById('result').classList.remove('show');
}
function deleteProduct() {
  if (!isStaff || !editingId) return;
  if (!confirm('¿Eliminar este producto del inventario?')) return;
  products = products.filter(p => p.id !== editingId);
  save(); render(); closeModal();
  toast('Producto eliminado');
}

/* ---------- Render ---------- */
function render() {
  const list = document.getElementById('list');
  const q = document.getElementById('search').value.trim().toLowerCase();
  document.getElementById('count').textContent = products.length;
  let items = products;
  if (q) {
    items = products.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.title || '').toLowerCase().includes(q) ||
      (p.code || '').includes(q)
    );
  }
  let extra = '';
  if (isStaff) {
    extra = '<div style="text-align:center;margin-top:18px"><button class="btn-ghost" style="display:inline-block;width:auto;padding:10px 18px" onclick="openCred()">Cambiar usuario y contraseña</button></div>';
  }
  if (items.length === 0) {
    list.innerHTML = '<div class="empty">' +
      (products.length === 0
        ? 'Aún no hay productos.<br>' + (isStaff ? 'Escanea o agrega productos.' : 'Pide a un empleado que cargue el inventario.')
        : 'Sin resultados para "' + escapeHtml(q) + '"') +
      '</div>' + extra;
    return;
  }
  list.innerHTML = items.map(p =>
    '<div class="product">' +
      '<div class="product-info">' +
        '<div class="product-name">' + escapeHtml(p.name) + '</div>' +
        (p.title ? '<div class="product-title">' + escapeHtml(p.title) + '</div>' : '') +
        (p.code ? '<div class="product-code">' + escapeHtml(p.code) + '</div>' : '') +
      '</div>' +
      '<div class="product-price">' + money(p.price) + '</div>' +
      (isStaff ?
        '<button class="product-edit" onclick="openModal(\'' + p.id + '\')">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1d29" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>' +
        '</button>' : '') +
    '</div>'
  ).join('') + extra;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Importación masiva ---------- */
let pendingImport = [];

function handleFile(event) {
  if (!isStaff) { toast('Necesitas acceso de empleado'); event.target.value = ''; return; }
  const file = event.target.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  const reader = new FileReader();

  if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
        parseRows(rows);
      } catch (err) { toast('Error al leer el Excel'); }
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = (e) => {
      try {
        const rows = parseDelimited(e.target.result);
        parseRows(rows);
      } catch (err) { toast('Error al leer el archivo'); }
    };
    reader.readAsText(file, 'UTF-8');
  }
  event.target.value = '';
}

function parseDelimited(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
  if (lines.length === 0) return [];
  const first = lines[0];
  let sep = ',';
  if (first.split(';').length > first.split(',').length) sep = ';';
  if (first.split('\t').length > first.split(sep).length) sep = '\t';
  return lines.map(line => splitLine(line, sep));
}

function splitLine(line, sep) {
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === sep && !inQ) {
      out.push(cur); cur = '';
    } else cur += ch;
  }
  out.push(cur);
  return out.map(s => s.trim());
}

function parseRows(rows) {
  if (!rows || rows.length === 0) { toast('El archivo está vacío'); return; }
  const header = rows[0].map(c => String(c).toLowerCase().trim());
  const keywords = ['nombre','name','titulo','título','title','precio','price','codigo','código','code','barras','barcode'];
  const hasHeader = header.some(h => keywords.includes(h));

  let col = { name: 0, title: 1, price: 2, code: 3 };
  let dataRows = rows;
  if (hasHeader) {
    col = { name: -1, title: -1, price: -1, code: -1 };
    header.forEach((h, i) => {
      if (['nombre','name'].includes(h)) col.name = i;
      else if (['titulo','título','title','descripcion','descripción'].includes(h)) col.title = i;
      else if (['precio','price'].includes(h)) col.price = i;
      else if (['codigo','código','code','barras','barcode'].includes(h)) col.code = i;
    });
    dataRows = rows.slice(1);
    if (col.name === -1) col = { name: 0, title: 1, price: 2, code: 3 };
  }

  const parsed = [];
  dataRows.forEach(r => {
    const name = (r[col.name] !== undefined ? String(r[col.name]) : '').trim();
    if (!name) return;
    const title = col.title >= 0 && r[col.title] !== undefined ? String(r[col.title]).trim() : '';
    const price = col.price >= 0 && r[col.price] !== undefined ? String(r[col.price]).trim() : '';
    const code = col.code >= 0 && r[col.code] !== undefined ? String(r[col.code]).trim() : '';
    parsed.push({ name, title, price, code });
  });

  if (parsed.length === 0) { toast('No se encontraron productos válidos'); return; }
  pendingImport = parsed;
  showImportPreview();
}

function showImportPreview() {
  let nuevos = 0, actualizar = 0;
  pendingImport.forEach(p => {
    const exists = p.code && products.find(x => x.code === p.code);
    if (exists) actualizar++; else nuevos++;
  });
  document.getElementById('importSummary').innerHTML =
    '<b>' + pendingImport.length + '</b> productos en el archivo · ' +
    '<span style="color:var(--green)">' + nuevos + ' nuevos</span> · ' +
    '<span style="color:var(--amber)">' + actualizar + ' ya existen</span>';

  const preview = pendingImport.slice(0, 50).map(p =>
    '<div style="padding:10px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px">' +
      '<div style="min-width:0"><div style="font-weight:600;font-size:14px">' + escapeHtml(p.name) + '</div>' +
      '<div style="font-size:11px;color:var(--muted)">' + escapeHtml(p.code || 'sin código') + '</div></div>' +
      '<div style="font-weight:700;white-space:nowrap">' + money(p.price) + '</div>' +
    '</div>'
  ).join('');
  document.getElementById('importPreview').innerHTML = preview +
    (pendingImport.length > 50 ? '<div style="padding:10px;text-align:center;color:var(--muted);font-size:12px">… y ' + (pendingImport.length - 50) + ' más</div>' : '');
  document.getElementById('importBg').classList.add('show');
}

function closeImport() {
  document.getElementById('importBg').classList.remove('show');
  pendingImport = [];
}

function confirmImport() {
  const updateExisting = document.getElementById('updateExisting').checked;
  let added = 0, updated = 0, skipped = 0;
  pendingImport.forEach(p => {
    const existing = p.code ? products.find(x => x.code === p.code) : null;
    if (existing) {
      if (updateExisting) {
        existing.name = p.name;
        if (p.title) existing.title = p.title;
        if (p.price) existing.price = p.price;
        updated++;
      } else skipped++;
    } else {
      products.push({ id: uid(), name: p.name, title: p.title, price: p.price, code: p.code });
      added++;
    }
  });
  save(); render(); closeImport();
  toast(added + ' agregados, ' + updated + ' actualizados' + (skipped ? ', ' + skipped + ' omitidos' : ''));
}

render();
</script>
